name: Metrics
on:
  schedule: [{cron: "0 */12 * * *"}]
  workflow_dispatch:
  push: {branches: ["master", "main"]}
jobs:
  profile-metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Header
        uses: overcookedpanda/metrics@master
        with:
          filename: header.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: overcookedpanda
          template: classic
          base: header
          optimize: css, xml
          retries: 3
          retries_delay: 30

      - name: Achievements
        uses: overcookedpanda/metrics@master
        with:
          filename: metrics.plugin.achievements.compact.svg
          token: ${{ secrets.METRICS_TOKEN }}
          base: ""
          plugin_achievements: yes
          plugin_achievements_only: polyglot, stargazer, sponsor, deployer, member, maintainer, developer, scripter, packager, explorer, infographile, manager
          plugin_achievements_display: compact
          plugin_achievements_threshold: X
          optimize: css, xml
          retries: 3
          retries_delay: 30

      - name: Lines of code
        uses: overcookedpanda/metrics@master
        with:
          filename: lines-of-code.svg
          token: ${{ secrets.METRICS_TOKEN }}
          base: "repositories"
          plugin_lines: yes
          optimize: css, xml
          retries: 3
          retries_delay: 30

      - name: Activity and community
        uses: overcookedpanda/metrics@master
        with:
          filename: acti_comm.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: overcookedpanda
          template: classic
          base: activity, community
          optimize: css, xml
          retries: 3
          retries_delay: 30

  plugins-metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Isometric calendar
        uses: overcookedpanda/metrics@master
        with:
          filename: iso_calender.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: overcookedpanda
          template: classic
          base: ""
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year
          optimize: css, xml
          retries: 3
          retries_delay: 30

      - name: Habits
        uses: overcookedpanda/metrics@master
        with:
          filename: github-habits.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: overcookedpanda
          base: ""
          template: classic
          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_days: 14
          plugin_habits_charts: yes
          plugin_habits_trim: yes
          optimize: css, xml
          retries: 3
          retries_delay: 30

      - name: Issues, PRs, and languages
        uses: overcookedpanda/metrics@master
        with:
          filename: issue_pr_lang.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: overcookedpanda
          template: classic
          base: ""
          plugin_followup: yes
          plugin_languages: yes
          optimize: css, xml
          retries: 3
          retries_delay: 30

      - name: Repositories
        uses: overcookedpanda/metrics@master
        with:
          filename: repositories.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: overcookedpanda
          template: classic
          base: repositories
          optimize: css, xml
          retries: 3
          retries_delay: 30
